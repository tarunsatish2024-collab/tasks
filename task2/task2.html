<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=for, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="" style="height: 500px; width:300px">
        <fieldset>
            <legend style="font-weight: bold;">User personal information</legend>
        <label for="name" style="font-weight: bold;">Enter  your full name</label>
        <br>
        <input type="text" placeholder="Enter your name" id="name" required style="width: 280px;height:30px">
        <br>
        <label for="email" style="font-weight: bold;">Enter your email</label>
        <br>
        <input type="email" id="email" placeholder="Enter your email" required style="width: 280px;height:30px">
        <br>
        <label for="password" style="font-weight: bold;">Enter your password</label>
        <br>
        <input type="password" id="password" placeholder="enter your password" style="width: 280px;height:30px">
        <br>
        <label for="Male" style="font-weight: bold;">Enter your gender</label>
        <br>
        <input type="radio" name="gender" name="Male" id="Male"><label for="Male" >Male</label>
        <input type="radio" name="gender" name="Female" id="Female"><label for="Female" >Female</label>
        <input type="radio" name="gender" name="Others" id="Others"><label for="Others" >Others</label>
        <br>
        <label for="date" style="font-weight: bold;">Enter your Date of Birth</label>
        <br>
        <input type="date" id="date" style="width: 280px;height:30px">
        <br>
        <label for="Address" style="font-weight: bold;">Enter your Address:</label>
        <br>
        <textarea id="Address" style="width: 280px;height:50px;" ></textarea>
        <br><br>
        <button type="submit" style="height:40px; width:80px;  border:2px solid black;">Submit</button>
        </fieldset>
    </form>
</body>
</html>

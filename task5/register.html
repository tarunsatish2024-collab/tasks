<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – ANU BLOG'S</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 1.8rem;
      color: #667eea;
      letter-spacing: 1px;
    }
    .logo p { color: #888; font-size: 0.85rem; margin-top: 4px; }

    h2 {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #667eea; }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }

    .footer-link {
      text-align: center;
      margin-top: 18px;
      font-size: 0.88rem;
      color: #666;
    }
    .footer-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }

    /* Alert */
    .alert {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.success { background: #e6f9f0; color: #1a7a4a; border: 1px solid #b2e8ce; }
    .alert.error   { background: #fdecea; color: #c0392b; border: 1px solid #f5b7b1; }
    .alert.show    { display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>ANU BLOG'S</h1>
    <p>Share your thoughts with the world</p>
  </div>

  <h2>Create an Account</h2>

  <div class="alert" id="alert"></div>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" />
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email" />
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Create password" />
  </div>
  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter phone number" />
  </div>

  <button onclick="register()">Register</button>

  <div class="footer-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
  // Bonus: if already logged in, go home
  if (localStorage.getItem('loggedInUser')) {
    window.location.href = 'home.html';
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }

  function register() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const phone    = document.getElementById('phone').value.trim();

    if (!username || !email || !password || !phone) {
      showAlert('All fields are required.', 'error');
      return;
    }

    // Store user data
    const users = JSON.parse(localStorage.getItem('users') || '[]');

    // Check duplicate username
    if (users.find(u => u.username === username)) {
      showAlert('Username already exists. Please choose another.', 'error');
      return;
    }

    users.push({ username, email, password, phone });
    localStorage.setItem('users', JSON.stringify(users));

    showAlert('Registration Successful! Redirecting to login…', 'success');
    setTimeout(() => window.location.href = 'login.html', 1800);
  }
</script>
</body>
</html>
